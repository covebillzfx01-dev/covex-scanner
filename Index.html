function bh(b){return Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('')}
function hb(h){const r=new Uint8Array(h.length/2);for(let i=0;i<h.length;i+=2)r[i/2]=parseInt(h.substr(i,2),16);return r}
function fk(n){if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString()}

function fr(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),se=Math.floor(s%60);return[h,m,se].map(x=>x.toString().padStart(2,'0')).join(':')}

function be(b){const a='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';let n=0n;for(const x of b)n=(n<<8n)|BigInt(x);if(n===0n)return'1';let s='';while(n>0n){const r=n%58n;s=a[Number(r)]+s;n/=58n}for(let i=0;i<b.length&&b[i]===0;i++)s='1'+s;return s}

async function genMnemonic(bits=128){const e=crypto.getRandomValues(new Uint8Array(bits/8));let bin='';for(const b of e)bin+=b.toString(2).padStart(8,'0');const cs=bits/32;const h=new Uint8Array(await crypto.subtle.digest('SHA-256',e));for(let i=0;i<cs;i++)bin+=(h[i>>3]>>>(7-(i%8)))&1;const w=[];for(let i=0;i<bin.length;i+=11)w.push(parseInt(bin.substr(i,11),2));return w.map(i=>BIP39_WORDS[i]).join(' ')}
async function m2s(m,p=''){const e=new TextEncoder();const k=await crypto.subtle.importKey('raw',e.encode(m),'PBKDF2',false,['deriveBits']);const s=e.encode('mnemonic'+p);return new Uint8Array(await crypto.subtle.deriveBits({name:'PBKDF2',salt:s,iterations:2048,hash:'SHA-512'},k,512))}
async function pk2btc(pk){const pub=secp.getPublicKey(pk,true);const s=new Uint8Array(await crypto.subtle.digest('SHA-256',pub));const r=new Uint8Array(await crypto.subtle.digest('RIPEMD-160',s));const pl=new Uint8Array(1+r.length+4);pl[0]=0;pl.set(r,1);const c=new Uint8Array(await crypto.subtle.digest('SHA-256',await crypto.subtle.digest('SHA-256',pl.slice(0,1+r.length))));pl.set(c.slice(0,4),1+r.length);return be(pl)}
function pk2eth(pk){const pub=secp.getPublicKey(pk,false);const h=keccak(pub.slice(1));return'0x'+h.slice(-40)}
async function pk2ltc(pk){const pub=secp.getPublicKey(pk,true);const s=new Uint8Array(await crypto.subtle.digest('SHA-256',pub));const r=new Uint8Array(await crypto.subtle.digest('RIPEMD-160',s));const pl=new Uint8Array(1+r.length+4);pl[0]=0x30;pl.set(r,1);const c=new Uint8Array(await crypto.subtle.digest('SHA-256',await crypto.subtle.digest('SHA-256',pl.slice(0,1+r.length))));pl.set(c.slice(0,4),1+r.length);return be(pl)}
async function pk2doge(pk){const pub=secp.getPublicKey(pk,true);const s=new Uint8Array(await crypto.subtle.digest('SHA-256',pub));const r=new Uint8Array(await crypto.subtle.digest('RIPEMD-160',s));const pl=new Uint8Array(1+r.length+4);pl[0]=0x1e;pl.set(r,1);const c=new Uint8Array(await crypto.subtle.digest('SHA-256',await crypto.subtle.digest('SHA-256',pl.slice(0,1+r.length))));pl.set(c.slice(0,4),1+r.length);return be(pl)}
async function pk2wif(pk,c=true){const pl=new Uint8Array(1+32+1+4);pl[0]=0x80;pl.set(pk,1);if(c)pl[33]=1;const l=c?34:33;const ch=new Uint8Array(await crypto.subtle.digest('SHA-256',await crypto.subtle.digest('SHA-256',pl.slice(0,l))));pl.set(ch.slice(0,4),l);return be(pl.slice(0,l+4))}
